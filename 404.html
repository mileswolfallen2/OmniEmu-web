<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | OmniEmu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mileswolfallen2/OmniEmu2.0/main/assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 24px 80px;
            position: relative;
            overflow: hidden;
        }

        .error-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 95%, 100% { text-shadow: none; }
            96% { text-shadow: -3px 0 #f472b6, 3px 0 #34d399; }
            97% { text-shadow: 3px 0 #f472b6, -3px 0 #34d399; }
            98% { text-shadow: -2px 0 #c084fc, 2px 0 #9b80ff; }
        }

        .error-icon {
            position: relative;
            z-index: 1;
            margin: 24px 0 32px;
            opacity: 0.7;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .error-msg {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 440px;
            margin: 0 auto 40px;
            line-height: 1.7;
            position: relative;
            z-index: 1;
        }

        .error-buttons {
            display: flex;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .error-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .error-cartridge {
            position: relative;
            z-index: 1;
            margin-bottom: 16px;
            animation: bob 3s ease-in-out infinite;
        }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .scanline {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="https://raw.githubusercontent.com/mileswolfallen2/OmniEmu2.0/main/assets/icon.png" alt="OmniEmu" class="nav-icon">
                <span>OmniEmu</span>
            </a>
            <div class="nav-links">
                <a href="index.html#features">Features</a>
                <a href="index.html#emulators">Emulators</a>
                <a href="help-guide.html">Help Guide</a>
                <a href="faq.html">FAQ</a>
                <a href="about.html">About</a>
                <a href="beta-features.html">Beta</a>
                <a href="https://github.com/mileswolfallen2/OmniEmu2.0" target="_blank" class="nav-github">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub
                </a>
            </div>
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="error-page">
        <div class="error-grid"></div>
        <div class="error-glow"></div>
        <div class="scanline"></div>

        <div class="error-cartridge">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="color: var(--accent-light);">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <rect x="6" y="8" width="12" height="8" rx="1"/>
                <line x1="6" y1="19" x2="18" y2="19" stroke-dasharray="2 2"/>
                <circle cx="12" cy="12" r="2" fill="currentColor" opacity="0.3"/>
            </svg>
        </div>

        <div class="error-code">404</div>
        <h1 class="error-title">Cartridge Not Inserted</h1>
        <p class="error-msg">The page you're looking for doesn't exist, was moved, or never loaded.</p>
        <div class="error-buttons">
            <a href="index.html" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Back to Home
            </a>
            <a href="https://github.com/mileswolfallen2/OmniEmu2.0/issues" target="_blank" class="btn btn-secondary">Report Issue</a>
        </div>
    </div>

    <script>
        const toggle = document.querySelector('.nav-toggle');
        const links = document.querySelector('.nav-links');
        toggle.addEventListener('click', () => {
            links.classList.toggle('active');
            toggle.classList.toggle('active');
        });
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                links.classList.remove('active');
                toggle.classList.remove('active');
            });
        });
    </script>
</body>
</html>
